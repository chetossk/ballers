<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carrito | Ballers</title>
  <link rel="stylesheet" href="../../css/base.css"/>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="container header__inner">
      <a class="logo" href="../../../../index.html">
        Ballers <span aria-hidden="true">🏀👟</span>
      </a>

      <button class="nav__toggle">☰</button>

      <nav class="nav">
        <ul>
          <li><a href="index.html">Inicio</a></li>
          <li><a href="catalog_user.html">Catálogo</a></li>
          <li><a class="active" href="cart.html">Carrito</a></li>
          <li><a href="comprados.html">Mis Compras</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container" style="padding:22px 0 64px">
    <section class="section">
      <h2 style="margin-bottom:12px">Carrito</h2>

      <div id="cart-list"></div>
      <div id="cart-total" style="margin-top:14px;font-weight:800"></div>

      <div style="margin-top:18px;">
        <button id="btn-finalizar" class="btn">
          Finalizar compra
        </button>
      </div>

      <p id="cart-msg" style="margin-top:10px"></p>
    </section>
  </main>

  <footer class="footer" style="background:#0f0f0f; color:#ccc; padding:25px 0;">
    <div class="container footer__inner" style="text-align:center;">
      <small>© 2025 Ballers. Todos los derechos reservados.</small>
    </div>
  </footer>

  <script>
  (async () => {

    const listEl  = document.getElementById('cart-list');
    const totalEl = document.getElementById('cart-total');
    const msgEl   = document.getElementById('cart-msg');
    const btnFinalizar = document.getElementById('btn-finalizar');

   const usuarioId = localStorage.getItem('ballers_user_id');


    if (!usuarioId) {
      alert("Debes iniciar sesión.");
      window.location.href = "login.html";
      return;
    }

    const money = n =>
      Number(n).toLocaleString('es-MX', { style:'currency', currency:'MXN' });

    // 🔥 CARGAR CARRITO REAL DESDE BD
    async function cargarCarrito() {

      try {

        const res = await fetch(`/api/carrito/${usuarioId}`);
        const carrito = await res.json();

        if (!carrito.length) {
          listEl.innerHTML = `
            <article class="card" style="padding:16px">
              <h3>Tu carrito está vacío</h3>
            </article>`;
          totalEl.textContent = '';
          btnFinalizar.style.display = "none";
          return;
        }

        btnFinalizar.style.display = "inline-block";

        listEl.innerHTML = carrito.map(item => `
          <article class="card" style="padding:16px;margin-bottom:10px">
            <h3>${item.nombre}</h3>
            <p>${money(item.precio)} x ${item.cantidad}</p>
          </article>
        `).join('');

        const total = carrito.reduce(
          (t, i) => t + (Number(i.precio) * i.cantidad),
          0
        );

        totalEl.textContent = "Total: " + money(total);

      } catch (error) {
        console.error(error);
        msgEl.textContent = "Error cargando carrito.";
      }
    }

    // 🔥 FINALIZAR COMPRA
    async function finalizarCompra() {

      try {

        const res = await fetch('/api/finalizar-compra', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ usuario_id: usuarioId })
        });

        const data = await res.json();

        if (res.ok) {
          alert("Compra realizada correctamente 🛒");
          cargarCarrito(); // recargar carrito vacío
        } else {
          alert(data.error || "Error al finalizar compra");
        }

      } catch (error) {
        console.error(error);
        alert("Error de conexión con el servidor");
      }
    }

    btnFinalizar.addEventListener("click", finalizarCompra);

    cargarCarrito();

  })();
  </script>

</body>
</html>
