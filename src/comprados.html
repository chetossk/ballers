<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Productos comprados | Ballers</title>
  <link rel="stylesheet" href="../../css/base.css"/>
  <style>
    .section {
      background: linear-gradient(180deg, rgba(255,106,0,.06), transparent 60%), var(--panel);
      border: 1px solid #23232a;
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      margin: 18px 0;
    }
    .toolbar { display: grid; gap: 10px; margin-bottom: 20px; }
    @media (min-width:720px) { .toolbar { grid-template-columns: 1fr auto auto; } }

    .status-badge {
      display: inline-block;
      padding: .2rem .55rem;
      border-radius: 999px;
      font-size: .85rem;
      border: 1px solid #2a2a32;
      text-transform: capitalize;
    }
    .ok { background: #11291a; border-color: #2c5d3f; color: #9de2b2; } 
    .ship { background: #122433; border-color: #214a6b; color: #98c9f0; } 
    .cancel { background: #2a1515; border-color: #6b2a2a; color: #ffbaba; } 

    .order {
      border: 1px solid #2a2a32;
      border-radius: 14px;
      overflow: hidden;
      margin: 10px 0;
      background: #111;
    }
    .order__head {
      padding: 14px 16px;
      display: grid;
      gap: 8px;
      align-items: center;
    }
    @media (min-width:760px) { 
      .order__head { grid-template-columns: 180px 1fr 180px 120px; } 
    }
    .order__body {
      padding: 15px 16px;
      border-top: 1px solid #23232a;
      background: #0a0a0a;
    }
    .muted { color: var(--muted); font-size: 0.9rem; }
    .btn--ghost { background: transparent; border: 1px solid #2a2a32; color: #fff; cursor: pointer; padding: 5px 10px; border-radius: 8px; }
    .btn--ghost:hover { background: #222; }
  </style>
</head>
<body>

  <header class="header">
    <div class="container header__inner">
      <a class="logo" href="../../../../index.html">Ballers 🏀👟</a>
      <nav class="nav">
        <ul>
          <li><a href="index.html">Inicio</a></li>
          <li><a href="catalog_user.html">Catálogo</a></li>
          <li><a class="active" href="comprados.html">Mis Compras</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container" style="padding:22px 0 64px">
    <section class="section">
      <h2 style="margin:0 0 10px">Mis pedidos reales</h2>
      <p class="muted" style="margin:0 0 14px">Datos obtenidos directamente de MySQL.</p>

      <div class="toolbar">
        <input id="q" type="search" placeholder="Buscar por ID de pedido..." />
        <select id="estado">
          <option value="todos">Todos los estados</option>
          <option value="entregado">Entregado</option>
          <option value="en_transito">En tránsito</option>
          <option value="cancelado">Cancelado</option>
        </select>
        <button id="limpiar" class="btn btn--ghost">Limpiar</button>
      </div>
    </section>

    <section id="orders"></section>
  </main>

  <script>
    (function(){
      const money = n => n.toLocaleString('es-MX', { style: 'currency', currency: 'MXN' });
      const byId = s => document.getElementById(s);
      
      const ordersEl = byId('orders');
      const qInput = byId('q');
      const estadoSelect = byId('estado');
      const limpiarBtn = byId('limpiar');

      let MIS_COMPRAS = [];

      // ESTA ES LA CLASE MODIFICADA Y COMPLETA
      async function cargarCompras() {
        try {
          // Obtenemos el ID del usuario del localStorage
          const userId = localStorage.getItem('ballers_id') || 9; 

          const res = await fetch('/api/mis-compras', {
            method: 'GET',
            headers: {
              'Content-Type': 'application/json',
              'x-user-id': userId
            }
          });

          // Si el servidor responde con error (como el 404 que tenías)
          if (!res.ok) {
            const text = await res.text();
            throw new Error(`Error ${res.status}: El servidor no devolvió JSON.`);
          }

          const data = await res.json();
          MIS_COMPRAS = data;
          render();
          
        } catch (e) {
          console.error("Error en cargarCompras:", e);
          ordersEl.innerHTML = `
            <div class="section" style="border-color: #6b2a2a;">
              <p style="color: #ffbaba;">⚠️ Error al conectar con el servidor.</p>
              <p class="muted">${e.message}</p>
            </div>`;
        }
      }

      function getBadge(status) {
        const s = (status || '').toLowerCase();
        if (s === 'entregado') return `<span class="status-badge ok">${status}</span>`;
        if (s === 'en_transito' || s === 'en tránsito') return `<span class="status-badge ship">${status}</span>`;
        if (s === 'cancelado') return `<span class="status-badge cancel">${status}</span>`;
        return `<span class="status-badge">${status || 'Pendiente'}</span>`;
      }

      function render() {
        const term = qInput.value.toLowerCase();
        const est = estadoSelect.value;

        const filtered = MIS_COMPRAS.filter(o => {
          const matchId = o.id.toString().toLowerCase().includes(term);
          const matchEst = est === 'todos' || o.status.toLowerCase().replace(' ', '_') === est;
          return matchId && matchEst;
        });

        if (filtered.length === 0) {
          ordersEl.innerHTML = '<div class="section"><p class="muted">No se encontraron pedidos en tu historial.</p></div>';
          return;
        }

        ordersEl.innerHTML = filtered.map(o => `
          <article class="order">
            <div class="order__head">
              <div><strong>Pedido</strong><br>#${o.id}</div>
              <div><strong>Fecha</strong><br><span class="muted">${new Date(o.date).toLocaleString()}</span></div>
              <div><strong>Total</strong><br><span>${money(o.total)}</span></div>
              <div style="text-align:right">
                ${getBadge(o.status)}
                <button class="btn--ghost" onclick="toggleDetalle('${o.id}')" style="margin-left:10px">Detalle</button>
              </div>
            </div>
            <div id="body-${o.id}" class="order__body" style="display:none">
              <h4 style="margin-bottom:10px">Artículos en este pedido:</h4>
              ${o.items.map(it => `
                <div style="display:flex; justify-content:space-between; margin-bottom:5px">
                  <span>${it.qty}x ${it.name}</span>
                  <span>${money(it.price * it.qty)}</span>
                </div>
              `).join('')}
              <div style="margin-top:15px; border-top:1px solid #23232a; padding-top:10px">
                <small class="muted">Dirección registrada: ${o.address || 'No especificada'}</small>
              </div>
            </div>
          </article>
        `).join('');
      }

      window.toggleDetalle = (id) => {
        const el = document.getElementById(`body-${id}`);
        if(el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
      };

      qInput.addEventListener('input', render);
      estadoSelect.addEventListener('change', render);
      limpiarBtn.addEventListener('click', () => {
        qInput.value = '';
        estadoSelect.value = 'todos';
        render();
      });

      cargarCompras();
    })();
  </script>
</body>
</html>
