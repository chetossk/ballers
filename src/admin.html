<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Admin - Usuarios</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      padding: 40px;
    }

    h1 {
      text-align: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 30px;
      background: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }

    th {
      background: #222;
      color: white;
    }

    tr:hover {
      background: #f1f1f1;
    }

    .activo {
      color: green;
      font-weight: bold;
    }

    .inactivo {
      color: red;
      font-weight: bold;
    }

  </style>
</head>
<body>

  <h1>Panel de Administración - Usuarios</h1>

  <table>
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Correo</th>
        <th>Estado</th>
      </tr>
    </thead>
    <tbody id="tabla-usuarios">
      <tr>
        <td colspan="3">Cargando usuarios...</td>
      </tr>
    </tbody>
  </table>

  <script>
    async function cargarUsuarios() {
      try {
        const res = await fetch('/api/usuarios');
        const data = await res.json();

        const tbody = document.getElementById('tabla-usuarios');

        if (data.length === 0) {
          tbody.innerHTML = `
            <tr>
              <td colspan="3">No hay usuarios registrados</td>
            </tr>
          `;
          return;
        }

        tbody.innerHTML = data.map(u => `
          <tr>
            <td>${u.nombre}</td>
            <td>${u.correo}</td>
            <td class="${u.estado === 'Activo' ? 'activo' : 'inactivo'}">
              ${u.estado}
            </td>
          </tr>
        `).join('');

      } catch (error) {
        console.error(error);
        document.getElementById('tabla-usuarios').innerHTML = `
          <tr>
            <td colspan="3">Error cargando usuarios</td>
          </tr>
        `;
      }
    }

    cargarUsuarios();
  </script>

</body>
</html>
