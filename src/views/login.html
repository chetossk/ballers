<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Ballers</title>
  <link rel="stylesheet" href="../css/base.css"/>
  <style>
    .auth-wrap{min-height:calc(100dvh - 80px);display:grid;place-items:center;padding:24px 0}
    .auth-card{width:100%;max-width:520px;background:var(--panel);border:1px solid #23232a;border-radius:var(--radius);box-shadow:var(--shadow);padding:22px}
    .auth-card h2{margin:0 0 8px}
    .auth-row{margin-top:12px}
    .auth-row label{display:block;font-weight:700;margin:0 0 8px}
    .auth-row input{width:100%;padding:10px 12px;border-radius:10px;border:1px solid #2a2a32;background:#141419;color:var(--text)}
    .auth-actions{margin-top:18px;display:flex;justify-content:center}
    .auth-actions .btn{min-width:160px;text-align:center}
    .alt{margin-top:14px;text-align:center}
    .alt a{color:var(--text);text-decoration:underline}
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="container header__inner">
      <a class="logo" href="../../../index.html">
        Ballers <span aria-hidden="true">🏀👟</span>
      </a>

      <button class="nav__toggle">☰</button>

      <nav class="nav">
        <ul>
          <li><a href="../../../index.html">Inicio</a></li>
          <li><a href="catalog.html">Catálogo</a></li>
          <li><a href="intranet.html">Intranet</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- Contenido -->
  <main class="container auth-wrap">
    <section class="auth-card">
      <h2>Iniciar sesión</h2>

      <form id="login-form">
        <div class="auth-row">
          <label for="email">Correo electrónico</label>
          <input id="email" type="email" required/>
        </div>

        <div class="auth-row">
          <label for="pass">Contraseña</label>
          <input id="pass" type="password" required/>
        </div>

        <div class="auth-actions">
          <button class="btn" type="submit">Entrar</button>
        </div>

        <p class="alt">
          ¿No tienes cuenta? <a href="signup.html">Crear cuenta</a>
        </p>
      </form>
    </section>
  </main>

  <!-- SCRIPT CORREGIDO -->
  <script>
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value;
    const pass = document.getElementById('pass').value;

    try {

      const response = await fetch('http://localhost:3000/api/login', {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify({ 
    email: email,
    password: pass
  })
});


      const data = await response.json();

      if (data.success) {

        // 🔥 GUARDAR SESIÓN CORRECTAMENTE
        localStorage.setItem('usuario_id', data.user.id);
        localStorage.setItem('rol', data.user.rol);

        // Redirigir según rol
        if (data.user.rol === 'admin') {
          window.location.href = 'admin/dashboard.html';
        } else {
          window.location.href = 'user/index.html';
        }

      } else {
        alert("Correo o contraseña incorrectos");
      }

    } catch (error) {
      alert("Error: Asegúrate que el servidor Node esté corriendo.");
    }
  });
  </script>

</body>
</html>
