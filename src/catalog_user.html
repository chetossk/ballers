<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Catálogo | Ballers</title>
  <link rel="stylesheet" href="./css/base.css"/>
</head>
<body>

<header class="header">
  <div class="container header__inner">
    <a class="logo" href="./index.html">
      Ballers <span aria-hidden="true">🏀👟</span>
    </a>

    <button class="nav__toggle" aria-expanded="false" aria-controls="mainnav">☰</button>
    <nav id="mainnav" class="nav">
      <ul>
        <li><a href="./index.html">Inicio</a></li>
        <li><a class="active" href="./catalog_user.html">Catálogo</a></li>
        <li><a href="./cart.html">Carrito</a></li>
      </ul>
    </nav>
  </div>
</header>

<section class="filters">
  <div class="container filters__inner">
    <div class="chips">
      <button class="chip is-active" data-cat="todo">Todo</button>
      <button class="chip" data-cat="sneakers">Sneakers</button>
      <button class="chip" data-cat="Ropa">Ropa</button>
      <button class="chip" data-cat="Accesorios">Accesorios</button>
      <button class="chip" data-cat="Calzado">Calzado</button>
    </div>

    <div class="sort">
      <label for="orden">Ordenar:</label>
      <select id="orden">
        <option value="popular">Más populares</option>
        <option value="precio-asc">Precio: bajo a alto</option>
        <option value="precio-desc">Precio: alto a bajo</option>
      </select>
    </div>
  </div>
</section>

<main class="container">
  <section id="product-grid" class="grid"></section>
</main>

<footer class="footer">
  <div class="container footer__inner">
    <small>© 2025 Ballers. Todos los derechos reservados.</small>
  </div>
</footer>

<script>
(async () => {

  const grid   = document.getElementById('product-grid');
  const chips  = Array.from(document.querySelectorAll('.chip'));
  const select = document.getElementById('orden');

  const money = n =>
    Number(n).toLocaleString('es-MX', { style:'currency', currency:'MXN' });

  let products = [];

  // 🔥 CARGAR PRODUCTOS DESDE MYSQL
  try {
    const res = await fetch('http://localhost:3000/api/productos');
    if (!res.ok) throw new Error('No se pudo cargar el catálogo');
    products = await res.json();
  } catch (err) {
    grid.innerHTML = `
      <article class="card" style="padding:16px">
        <h3>Error</h3>
        <p>${err.message}</p>
      </article>`;
    return;
  }

  function cardTemplate(p) {
    return `
      <article class="card" data-category="${p.categoria}">
        <div class="card__img"
             style="background:url('${p.imagen}') center/cover no-repeat">
        </div>

        <div class="card__body">
          <h3 class="card__title">${p.nombre}</h3>
          <p class="card__price">${money(p.precio)}</p>

          <div class="card__actions">
            <button class="btn btn--ghost">♡</button>
            <button class="btn" data-add="${p.id}">
              Comprar
            </button>
          </div>
        </div>
      </article>`;
  }

  let current = [...products];

  function applyFilters() {
    const active = document.querySelector('.chip.is-active');
    const cat = active.dataset.cat;

    current = cat === 'todo'
      ? [...products]
      : products.filter(p => p.categoria === cat);
  }

  function applySort() {
    const v = select.value;

    if (v === 'precio-asc')
      current.sort((a,b)=>a.precio-b.precio);

    if (v === 'precio-desc')
      current.sort((a,b)=>b.precio-a.precio);
  }

  function render() {
    grid.innerHTML = current.map(cardTemplate).join('');
  }

  chips.forEach(chip => chip.addEventListener('click', () => {
    chips.forEach(c => c.classList.remove('is-active'));
    chip.classList.add('is-active');
    applyFilters();
    applySort();
    render();
  }));

  select.addEventListener('change', () => {
    applySort();
    render();
  });

  render();

  // 🔥 AGREGAR AL CARRITO
  grid.addEventListener('click', async e => {

    const btn = e.target.closest('[data-add]');
    if (!btn) return;

    const productoId = btn.getAttribute('data-add');
    const usuarioId = localStorage.getItem('usuario_id');

    if (!usuarioId) {
      alert("Debes iniciar sesión para comprar.");
      window.location.href = "./login.html";
      return;
    }

    try {
      const res = await fetch('http://localhost:3000/api/carrito', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          usuario_id: Number(usuarioId),
          producto_id: Number(productoId),
          cantidad: 1
        })
      });

      const data = await res.json();

      if (res.ok) {
        alert("Producto agregado al carrito 🛒");
        window.location.href = './cart.html';
      } else {
        alert(data.error || "Error agregando al carrito");
      }

    } catch (error) {
      console.error(error);
      alert("Error de conexión con el servidor");
    }

  });

})();
</script>

</body>
</html>
