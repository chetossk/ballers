<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Catálogo | Ballers</title>

  <!-- CSS -->
  <link rel="stylesheet" href="./css/base.css"/>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="container header__inner">
      <a class="logo" href="./index.html">
        Ballers <span aria-hidden="true">🏀👟</span>
      </a>

      <button class="nav__toggle" aria-expanded="false" aria-controls="mainnav">☰</button>
      <nav id="mainnav" class="nav">
        <ul>
          <li><a href="./index.html">Inicio</a></li>
          <li><a class="active" href="./catalog.html" aria-current="page">Catálogo</a></li>
          <li><a href="./cart.html">Carrito</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- Filtros -->
  <section class="filters">
    <div class="container filters__inner">
      <div class="chips">
        <button class="chip is-active" data-cat="todo">Todo</button>
        <button class="chip" data-cat="sneakers">Sneakers</button>
        <button class="chip" data-cat="jerseys">Jerseys</button>
        <button class="chip" data-cat="gorras">Gorras</button>
        <button class="chip" data-cat="accesorios">Accesorios</button>
      </div>

      <div class="sort">
        <label for="orden">Ordenar:</label>
        <select id="orden">
          <option value="popular">Más populares</option>
          <option value="nuevo">Novedades</option>
          <option value="precio-asc">Precio: bajo a alto</option>
          <option value="precio-desc">Precio: alto a bajo</option>
        </select>
      </div>
    </div>
  </section>

  <!-- Grid -->
  <main class="container">
    <section id="product-grid" class="grid" aria-live="polite"></section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container footer__inner">
      <small>© 2025 Ballers. Todos los derechos reservados.</small>
    </div>
  </footer>

  <!-- JS -->
  <script src="./js/app.js"></script>

  <script>
  (async () => {
    const grid   = document.getElementById('product-grid');
    const chips  = Array.from(document.querySelectorAll('.chip'));
    const select = document.getElementById('orden');

    const money = n =>
      n.toLocaleString('es-MX', { style:'currency', currency:'MXN' });

    // Cargar productos
    let products = [];
    try {
      const res = await fetch('./data/products.json', { cache: 'no-store' });
      if (!res.ok) throw new Error('No se pudo cargar el catálogo');
      products = await res.json();
    } catch (err) {
      grid.innerHTML = `
        <article class="card" style="padding:16px">
          <h3>Error</h3>
          <p>${err.message}</p>
        </article>`;
      return;
    }

    // Card
    function cardTemplate(p) {
      return `
        <article class="card" data-category="${p.category}">
          <div class="card__img"
               style="background:url('${p.image}') center/cover no-repeat">
          </div>

          <div class="card__body">
            <h3 class="card__title">${p.name}</h3>
            <p class="card__price">${money(p.price)}</p>

            <div class="card__actions">
              <button class="btn btn--ghost">♡</button>
              <button class="btn" data-add="${p.id}">
                Añadir al carrito
              </button>
            </div>
          </div>
        </article>`;
    }

    let current = [...products];

    function applyFilters() {
      const active = document.querySelector('.chip.is-active');
      const cat = active.dataset.cat;
      current = cat === 'todo'
        ? [...products]
        : products.filter(p => p.category === cat);
    }

    function applySort() {
      const v = select.value;
      if (v === 'precio-asc')  current.sort((a,b)=>a.price-b.price);
      if (v === 'precio-desc') current.sort((a,b)=>b.price-a.price);
      if (v === 'nuevo')       current.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
      if (v === 'popular')     current.sort((a,b)=>(b.popularity||0)-(a.popularity||0));
    }

    function render() {
      grid.innerHTML = current.map(cardTemplate).join('');
    }

    chips.forEach(chip => chip.addEventListener('click', () => {
      chips.forEach(c => c.classList.remove('is-active'));
      chip.classList.add('is-active');
      applyFilters(); applySort(); render();
    }));

    select.addEventListener('change', () => {
      applySort(); render();
    });

    render();

    grid.addEventListener('click', e => {
      const btn = e.target.closest('[data-add]');
      if (btn) window.location.href = './cart.html';
    });
  })();
  </script>

</body>
</html>
