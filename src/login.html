<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Ballers</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #121212;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-card {
            background: #ffffff;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-card h1 { 
            color: #1a1a1a;
            margin-bottom: 0.5rem;
            font-size: 2rem;
        }

        .login-card p { 
            color: #555;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 700;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            color: #000;
            background-color: #fff;
        }

        .form-group input:focus {
            border-color: #f58233;
            outline: none;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: #f58233;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
        }

        .btn-login:hover {
            background-color: #e67622;
        }

        #error-box {
            background-color: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 1rem;
            display: none;
            font-size: 0.9rem;
            border: 1px solid #ef9a9a;
        }

        .footer-links {
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }

        .footer-links a {
            color: #f58233;
            text-decoration: none;
            font-weight: bold;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .back-link {
            display: block;
            margin-top: 1rem;
            color: #888;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h1>Ballers 🏀</h1>
    <p>Accede a tu cuenta oficial</p>
    
    <div id="error-box"></div>

    <form id="loginForm">
        <div class="form-group">
            <label>Correo electrónico</label>
            <input type="email" id="email" placeholder="ejemplo@outlook.com" required>
        </div>
        
        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-login">Entrar</button>
    </form>

    <div class="footer-links">
        ¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a>
        <a href="index.html" class="back-link">← Volver a la tienda</a>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const errorBox = document.getElementById('error-box');

    errorBox.style.display = 'none';

    try {

        const response = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!data.success) {
            errorBox.innerText = data.message || "Credenciales incorrectas";
            errorBox.style.display = 'block';
            return;
        }

        // 🔥 Guardar datos correctamente
        localStorage.setItem('usuario_id', data.id);
        localStorage.setItem('ballers_role', data.role);

        // Redirigir
        window.location.href = 'index.html';

    } catch (err) {
        console.error("Error de conexión:", err);
        errorBox.innerText = "Error: El servidor no responde.";
        errorBox.style.display = 'block';
    }
});
</script>

</body>
</html>
