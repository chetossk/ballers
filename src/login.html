<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ballers</title>
    <link rel="stylesheet" href="../../css/base.css">
    
    <style>
        /* RESET Y FONDO */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #121212; /* Fondo oscuro para que resalte la tarjeta */
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* TARJETA DE LOGIN */
        .login-card {
            background: #ffffff; /* Fondo blanco puro */
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        /* TEXTOS PRINCIPALES (CORRECCIÓN DE LETRA TENUE) */
        .login-card h1 { 
            color: #1a1a1a !important; 
            margin-bottom: 0.5rem;
            font-size: 2rem;
        }

        .login-card p { 
            color: #555 !important; 
            margin-bottom: 1.5rem;
        }

        /* FORMULARIO */
        .form-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 700;
            color: #333 !important; /* Texto negro para etiquetas */
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            color: #000 !important; /* Texto que escribe el usuario en negro */
            background-color: #fff !important;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            border-color: #f58233;
            outline: none;
        }

        /* BOTÓN */
        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: #f58233;
            color: #ffffff !important;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            margin-top: 1rem;
        }

        .btn-login:hover {
            background-color: #e67622;
            transform: translateY(-2px);
        }

        /* MENSAJES DE ERROR */
        #error-box {
            background-color: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 1rem;
            display: none;
            font-size: 0.9rem;
            border: 1px solid #ef9a9a;
        }

        /* ENLACES */
        .footer-links {
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }

        .footer-links a {
            color: #f58233 !important;
            text-decoration: none;
            font-weight: bold;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .back-link {
            display: block;
            margin-top: 1rem;
            color: #888 !important;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h1>Ballers 🏀</h1>
    <p>Accede a tu cuenta oficial</p>
    
    <div id="error-box"></div>

    <form id="loginForm">
        <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" placeholder="ejemplo@outlook.com" required>
        </div>
        
        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-login">Entrar</button>
    </form>

    <div class="footer-links">
        ¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a>
        <a href="index.html" class="back-link">← Volver a la tienda</a>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorBox = document.getElementById('error-box');

        // Limpiar errores previos
        errorBox.style.display = 'none';

        try {
            // Petición a tu servidor Node.js (asegúrate que el servidor esté corriendo)
            const response = await fetch('http://localhost:3000/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (data.success) {
                // Guardamos el rol que el servidor extrajo de MySQL
                localStorage.setItem('ballers_role', data.role);
                // Redirigimos al index
                window.location.href = 'index.html'; 
            } else {
                // Mostramos el error (credenciales incorrectas)
                errorBox.innerText = data.message || "Error al iniciar sesión";
                errorBox.style.display = 'block';
            }
        } catch (err) {
            console.error("Error de conexión:", err);
            errorBox.innerText = "Error: El servidor no responde.";
            errorBox.style.display = 'block';
        }
    });
</script>

</body>
</html>
