<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inventario | Ballers (Admin)</title>
  <link rel="stylesheet" href="../../css/base.css"/>
  <style>
    .toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:18px 0}
    .toolbar .grow{flex:1 1 220px}
    table.inv{width:100%;border-collapse:separate;border-spacing:0 8px}
    table.inv thead th{font-weight:700;text-align:left;padding:10px 12px;color:var(--muted)}
    table.inv tbody tr{background:var(--panel);border:1px solid #23232a}
    table.inv tbody td{padding:12px}
    .badge{display:inline-block;padding:4px 8px;border-radius:999px;font-size:.85rem;border:1px solid #2a2a32}
    .badge.ok{background:#142b18; color:#aeeabf; border-color:#2e6a3f}
    .badge.off{background:#2a1a1a; color:#ff8a8a; border-color:#6a2e2e}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    .btn-mini{padding:6px 10px;border-radius:10px;border:1px solid #2a2a32;background:#141419;color:var(--text);cursor:pointer}
    .btn-mini:hover{background:#1b1b22}
    .btn-ghost{background:transparent}
    .section{background:linear-gradient(180deg,rgba(255,106,0,.06),transparent 60%),var(--panel);
      border:1px solid #23232a;border-radius:var(--radius);padding:22px;box-shadow:var(--shadow)}
  </style>
</head>
<body>

  <header class="header">
    <div class="container header__inner" style="display:flex; align-items:center;">
      <a class="logo" href="../../../../index.html">Ballers 🏀👟</a>
      <nav id="mainnav" class="nav" style="margin-left:auto">
        <ul>
          <li><a href="index.html">Inicio</a></li>
          <li><a class="active" href="inventario.html">Inventario</a></li>
          <li><a href="usuarios.html">Usuarios</a></li>
          <li><a href="productos.html">Productos (CRUD)</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container" style="padding:22px 0 64px">
    <section class="section">
      <h2 style="margin:0">Inventario Real (MySQL)</h2>
      <p class="muted" style="margin:6px 0 0">Gestiona existencias directamente en la base de datos.</p>

      <div class="toolbar">
        <input id="q" class="grow" type="search" placeholder="Buscar por nombre o ID..." />
        <select id="cat">
          <option value="all">Todas las categorías</option>
          <option value="sneakers">Sneakers</option>
          <option value="jerseys">Jerseys</option>
          <option value="gorras">Gorras</option>
          <option value="accesorios">Accesorios</option>
        </select>
        <select id="sort">
          <option value="name-asc">Nombre (A–Z)</option>
          <option value="stock-asc">Menor Stock</option>
          <option value="stock-desc">Mayor Stock</option>
        </select>
        <a class="btn" href="productos.html">Nuevo producto</a>
      </div>

      <div style="overflow:auto">
        <table class="inv">
          <thead>
            <tr>
              <th>ID</th>
              <th>Producto</th>
              <th>Categoría</th>
              <th>Precio</th>
              <th>Stock</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tbody">
            </tbody>
        </table>
      </div>
      <p id="tbl-info" class="muted" style="margin-top:8px"></p>
    </section>
  </main>

  <script>
    (async () => {
      const $ = s => document.querySelector(s);
      const tbody = $('#tbody');
      const q = $('#q'); 
      const cat = $('#cat'); 
      const sort = $('#sort');
      const info = $('#tbl-info');

      const money = n => Number(n).toLocaleString('es-MX',{style:'currency',currency:'MXN'});

      let products = []; // Aquí guardaremos lo que venga de la DB

      // FUNCIÓN PARA CARGAR DESDE LA API
      async function loadInventario() {
        try {
          const res = await fetch('/api/inventario');
          if (!res.ok) throw new Error('Error al conectar con la API');
          const data = await res.json();
          
          products = data.map(p => ({
            id: p.id,
            sku: 'ID-' + String(p.id).padStart(3, '0'),
            name: p.nombre,
            category: (p.categoria || 'varios').toLowerCase(),
            price: Number(p.precio),
            stock: Number(p.stock || 0),
            active: p.active === 1 || p.active === true
          }));
          
          render();
        } catch (err) {
          tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:20px;">Error: ${err.message}</td></tr>`;
        }
      }

      function render() {
        // Filtros
        const term = q.value.toLowerCase();
        const categoryFilter = cat.value;
        
        let filtered = products.filter(p => {
          const matchText = p.name.toLowerCase().includes(term) || p.sku.toLowerCase().includes(term);
          const matchCat = categoryFilter === 'all' || p.category === categoryFilter;
          return matchText && matchCat;
        });

        // Orden
        if (sort.value === 'stock-asc') filtered.sort((a,b) => a.stock - b.stock);
        if (sort.value === 'stock-desc') filtered.sort((a,b) => b.stock - a.stock);
        if (sort.value === 'name-asc') filtered.sort((a,b) => a.name.localeCompare(b.name));

        if (filtered.length === 0) {
          tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:20px;">No se encontraron productos.</td></tr>';
          return;
        }

        tbody.innerHTML = filtered.map(p => `
          <tr>
            <td>${p.sku}</td>
            <td><strong>${p.name}</strong></td>
            <td style="text-transform: capitalize;">${p.category}</td>
            <td>${money(p.price)}</td>
            <td><strong style="font-size: 1.1rem; color: ${p.stock < 5 ? '#ff6b6b' : 'inherit'}">${p.stock}</strong></td>
            <td><span class="badge ${p.active ? 'ok' : 'off'}">${p.active ? 'Activo' : 'Inactivo'}</span></td>
            <td class="actions">
              <button class="btn-mini" onclick="updateStock(${p.id}, -1)">−</button>
              <button class="btn-mini" onclick="updateStock(${p.id}, 1)">+</button>
              <button class="btn-mini btn-ghost" onclick="toggleStatus(${p.id})">${p.active ? 'Desactivar' : 'Activar'}</button>
            </td>
          </tr>
        `).join('');

        info.textContent = `Mostrando ${filtered.length} productos de la base de datos.`;
      }

      // ACCIÓN: ACTUALIZAR STOCK EN DB
      window.updateStock = async (id, delta) => {
        const item = products.find(p => p.id === id);
        const nuevoStock = Math.max(0, item.stock + delta);
        
        try {
          const res = await fetch(`/api/inventario/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ stock: nuevoStock, active: item.active ? 1 : 0 })
          });
          
          if (res.ok) {
            item.stock = nuevoStock;
            render();
          }
        } catch (e) { alert("Error al actualizar stock"); }
      };

      // ACCIÓN: CAMBIAR ESTADO EN DB
      window.toggleStatus = async (id) => {
        const item = products.find(p => p.id === id);
        const nuevoEstado = !item.active;

        try {
          const res = await fetch(`/api/inventario/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ stock: item.stock, active: nuevoEstado ? 1 : 0 })
          });
          
          if (res.ok) {
            item.active = nuevoEstado;
            render();
          }
        } catch (e) { alert("Error al cambiar estado"); }
      };

      // Eventos de búsqueda
      q.addEventListener('input', render);
      cat.addEventListener('change', render);
      sort.addEventListener('change', render);

      // Carga inicial
      loadInventario();
    })();
  </script>
</body>
</html>
